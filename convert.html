<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển đổi Bảng Từ Vựng Word sang JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f4f7f6;
        }
        h2 {
            color: #2c3e50;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            resize: vertical;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            align-self: flex-start;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2ecc71;
        }
        .instruction {
            background-color: #ecf0f1;
            padding: 15px;
            border-left: 6px solid #3498db;
            border-radius: 4px;
            line-height: 1.6;
        }
        code {
            background-color: #dfe6e9;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>Công Cụ Chuyển Đổi Bảng Từ Vựng (Tab-separated)</h2>
    
    <div class="instruction">
        <p><strong>Hướng dẫn:</strong> Copy các hàng từ bảng từ vựng trong Word/Excel và dán vào ô bên dưới. Hệ thống sẽ tự động nhận diện khoảng trắng Tab để tách thành các thuộc tính.</p>
        <p><i>Định dạng chuẩn (5 cột):</i><br>
        <code>[ID] [Từ vựng] [Loại từ] [Phiên âm] [Nghĩa]</code></p>
    </div>

    <div class="container">
        <label for="wordInput"><strong>1. Dán dữ liệu bảng từ Word vào đây:</strong></label>
        <textarea id="wordInput" rows="6" placeholder="726	interrupt	v.	/ˌɪn.təˈrʌpt/	Làm gián đoạn, làm phiền"></textarea>

        <button onclick="convertToJS()">Chuyển đổi sang JS</button>

        <label for="jsOutput"><strong>2. Kết quả mã JavaScript:</strong></label>
        <textarea id="jsOutput" rows="15" readonly placeholder="Mảng JavaScript sẽ hiện ra ở đây..."></textarea>
    </div>

    <script>
        function convertToJS() {
            const inputText = document.getElementById('wordInput').value;
            // Tách các dòng và loại bỏ dòng trống
            const lines = inputText.split('\n').filter(line => line.trim() !== '');
            const vocabularyArray = [];

            lines.forEach(line => {
                // Khi copy từ Word table, các cột được ngăn cách bằng dấu Tab (\t)
                const parts = line.split('\t');

                // Nếu dòng có đủ 5 cột dữ liệu
                if (parts.length >= 5) {
                    vocabularyArray.push({
                        id: parts[0].trim(),
                        // Giữ nguyên từ vựng, ưu tiên dùng dạng động từ nguyên thể (base form) khi dán vào
                        word: parts[1].trim(), 
                        pos: parts[2].trim(),
                        ipa: parts[3].trim(),
                        meaning: parts[4].trim()
                    });
                } 
                // Xử lý linh hoạt nếu dòng chỉ có 2-4 cột (bỏ qua ID hoặc IPA, v.v.)
                else if (parts.length > 1) {
                    vocabularyArray.push({
                        word: parts[1] ? parts[1].trim() : parts[0].trim(),
                        meaning: parts[parts.length - 1].trim()
                    });
                }
            });

            // Định dạng thành chuỗi JSON đẹp mắt
            const jsCode = `const vocabularyList = ${JSON.stringify(vocabularyArray, null, 4)};`;
            
            document.getElementById('jsOutput').value = jsCode;
        }
    </script>

</body>
</html>
