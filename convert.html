<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển đổi Từ vựng sang vocab.js</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        input, button, select {
            font-family: inherit;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f9f9f9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        h2 {
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 180px;
            margin-bottom: 15px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #357ae8;
        }
        .btn-copy {
            background-color: #34a853;
        }
        .btn-copy:hover {
            background-color: #2b8c46;
        }
        .note {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>1. Nhập dữ liệu từ vựng</h2>
    <p class="note"><b>Lưu ý:</b> Hãy copy trực tiếp từ Excel hoặc Google Sheets (các cột tự động cách nhau bằng dấu Tab).<br>
    <i>Thứ tự cột: ID | Từ vựng | Loại từ | Phiên âm | Ý nghĩa | Ví dụ</i></p>
    <textarea id="inputText" placeholder="Dán dữ liệu vào đây...&#10;Ví dụ:&#10;1&#9;Over the moon&#9;idiom&#9;/ˌəʊ.və ðə ˈmuːn/&#9;Cực kỳ vui sướng...&#9;She was over the moon..."></textarea>
    
    <div class="controls">
        <button onclick="convertToJS()">Chuyển đổi ➔</button>
        <button class="btn-copy" onclick="copyResult()">📋 Copy Code JS</button>
    </div>

    <h2>2. Kết quả (Code cho vocab.js)</h2>
    <textarea id="outputText" readonly placeholder="Code JavaScript sẽ hiện ở đây..."></textarea>
</div>

<script>
    function convertToJS() {
        const input = document.getElementById('inputText').value;
        const lines = input.trim().split('\n');
        const vocabArray = [];

        for (let line of lines) {
            // Bỏ qua các dòng trống
            if (!line.trim()) continue; 
            
            // Tách dữ liệu bằng dấu Tab (\t) hoặc khoảng trắng lớn nếu copy từ text thường
            let cols = line.split(/\t/);
            if (cols.length < 6) {
                // Fallback: Nếu không có dấu tab, thử tách bằng cụm nhiều khoảng trắng (nếu copy từ PDF/Word)
                cols = line.split(/ {2,}/);
            }

            // Đảm bảo dòng có đủ 6 cột dữ liệu cơ bản
            if (cols.length >= 6) {
                vocabArray.push({
                    id: isNaN(cols[0]) ? cols[0].trim() : Number(cols[0].trim()),
                    word: cols[1].trim(),
                    type: cols[2].trim(),
                    pronunciation: cols[3].trim(),
                    meaning: cols[4].trim(),
                    example: cols[5].trim()
                });
            }
        }

        if (vocabArray.length === 0) {
            alert("Không tìm thấy dữ liệu hợp lệ. Vui lòng kiểm tra lại định dạng!");
            return;
        }

        // Tạo chuỗi code JavaScript
        const jsString = "const vocabList = " + JSON.stringify(vocabArray, null, 4) + ";\n\n// Xuất biến để sử dụng ở file khác (Bỏ comment nếu dùng Module)\n// export default vocabList;";
        
        document.getElementById('outputText').value = jsString;
    }

    function copyResult() {
        const outputText = document.getElementById('outputText');
        if (!outputText.value) {
            alert("Chưa có code để copy!");
            return;
        }
        outputText.select();
        document.execCommand('copy');
        
        // Đổi text nút tạm thời để báo hiệu đã copy
        const btn = document.querySelector('.btn-copy');
        const originalText = btn.innerHTML;
        btn.innerHTML = "✔ Đã Copy!";
        setTimeout(() => {
            btn.innerHTML = originalText;
        }, 2000);
    }
</script>

</body>
</html>
