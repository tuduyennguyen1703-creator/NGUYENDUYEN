<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng - Nguyễn Duyên</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f0;
            padding: 5% 2%;
            margin: 0;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 5%;
            border-radius: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.15);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #ffeaea;
            padding-bottom: 20px;
        }
        .header h1 {
            color: #d32f2f;
            font-size: 36px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header h2 {
            color: #e53935;
            font-size: 24px;
            margin: 0;
            font-weight: 600;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
            gap: 20px;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            padding: 6% 5%;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(211, 47, 47, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card-title {
            z-index: 2;
        }
        .card-progress-text {
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
            z-index: 2;
            color: #ffeaea;
            background: rgba(0, 0, 0, 0.2);
            padding: 3px 10px;
            border-radius: 10px;
        }
        .card-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background-color: #2ecc71;
            transition: width 0.5s ease;
            z-index: 1;
        }
        .card:hover {
            background-color: #c62828;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(211, 47, 47, 0.4);
        }
        .card.special {
            background-image: linear-gradient(135deg, #d32f2f, #b71c1c);
            grid-column: 1 / -1;
            font-size: 22px;
            padding: 6% 5%;
        }

        /* Responsive cho thiết bị di động */
        @media (max-width: 600px) {
            .header h1 { font-size: 28px; }
            .header h2 { font-size: 20px; }
            .card { font-size: 16px; padding: 20px 15px; }
            .card.special { font-size: 18px; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HỌC TỪ VỰNG</h1>
            <h2>NGUYỄN DUYÊN</h2>
        </div>
        
        <div class="grid-container">
            <a href="reading_flashcard.html" class="card" id="card-reading">
                <span class="card-title">📚 Mục 1: Vocab Reading</span>
                <span class="card-progress-text">Đã học: 0%</span>
                <div class="card-progress-bar" style="width: 0%"></div>
            </a>
            <a href="speaking_flashcard.html" class="card" id="card-speaking">
                <span class="card-title">🚀 Mục 2: Vocab Speaking</span>
                <span class="card-progress-text">Đã học: 0%</span>
                <div class="card-progress-bar" style="width: 0%"></div>
            </a>
            <a href="#" class="card">Mục 3: Vocab Writing</a>
            <a href="#" class="card">Mục 4: Level B1_B2</a>
            <a href="#" class="card">Mục 5: Level C1_C2</a>
            <a href="idiom_flashcard.html" class="card" id="card-idiom">
                <span class="card-title">💡 Mục 6: Idiom</span>
                <span class="card-progress-text">Đã học: 0%</span>
                <div class="card-progress-bar" style="width: 0%"></div>
            </a>
            <a href="phrasalverb_flashcard.html" class="card" id="card-phrasalverb">
                <span class="card-title">🧩 Mục 7: Phrasal Verb</span>
                <span class="card-progress-text">Đã học: 0%</span>
                <div class="card-progress-bar" style="width: 0%"></div>
            </a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            function updateProgress(id, prefix) {
                const card = document.getElementById(id);
                if (!card) return;
                
                const totalStr = localStorage.getItem(prefix + '_total_words');
                const total = totalStr ? parseInt(totalStr) : 0;
                
                let learned = 0;
                if (total > 0) {
                    const learnedArray = JSON.parse(localStorage.getItem(prefix + '_learned_words')) || [];
                    learned = learnedArray.length;
                }
                
                let percent = 0;
                if (total > 0) {
                    percent = Math.round((learned / total) * 100);
                }
                
                const textEl = card.querySelector('.card-progress-text');
                const barEl = card.querySelector('.card-progress-bar');
                
                if (textEl) textEl.innerText = `Đã học: ${percent}%`;
                if (barEl) barEl.style.width = `${percent}%`;
            }

            updateProgress('card-reading', 'reading');
            updateProgress('card-speaking', 'speaking');
            updateProgress('card-idiom', 'idiom');
            updateProgress('card-phrasalverb', 'phrasalverb');
        });
    </script>
</body>
</html>
